# For Sensitive data, use base64 decoding
# First, generate the base64 values
# echo -n "myapp-dev-db-password" | base64
# Output: bXlhcHAtZGV2LWRiLXBhc3N3b3Jk
# echo -n "myapp-dev-api-key-abc123" | base64
# Output: bXlhcHAtZGV2LWFwaS1rZXktYWJjMTIz
# echo -n "postgresql://myapp:myapp-dev-db-password@postgres:5432/myapp_dev" | base64
# Output: cG9zdGdyZXNxbDovL215YXBwOm15YXBwLWRldi1kYi1wYXNzd29yZEBwb3N0Z3JlczoKNTQzMi9teWFwcF9kZXY=
apiVersion: v1
kind: Secret
metadata:
  name: myapp-secret
  namespace: myapp-dev
  labels:
    app: myapp
    environment: dev
type: Opaque
data:
  # Values must be base64 encoded
  # echo -n "value" | base64
  DB_PASSWORD: bXlhcHAtZGV2LWRiLXBhc3N3b3Jk
  API_KEY: bXlhcHAtZGV2LWFwaS1rZXktYWJjMTIz
  DATABASE_URL: cG9zdGdyZXNxbDovL215YXBwOm15YXBwLWRldi1kYi1wYXNzd29yZEBwb3N0Z3JlczoKNTQzMi9teWFwcF9kZXY=