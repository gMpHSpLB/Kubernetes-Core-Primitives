apiVersion: v1
kind: Pod
metadata:
  name: oom-pod
  namespace: myapp-dev
spec:
  containers:
    - name: memory-hog
      image: polinux/stress
      # This allocates 100Mi of memory but limit is only 32Mi
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "100M", "--vm-hang", "0"]
      resources:
        requests:
          memory: "16Mi"
          cpu: "10m"
        limits:
          memory: "32Mi"   # Will be OOMKilled at 32Mi
          cpu: "100m"
  restartPolicy: Never
