apiVersion: v1
kind: Pod
metadata:
  name: myapp-pod-working
  namespace: myapp-dev
  labels:
    app: myapp
    version: v1
    component: api
spec:
  containers:
    - name: myapp
      # nginx is a stable web server — use it as a stand-in for your app
      # It listens on port 80 and responds to HTTP — perfect for probe testing
      image: nginx:1.25-alpine
      
      ports:
        - name: http
          containerPort: 80
      
      resources:
        requests:
          memory: "32Mi"
          cpu: "25m"
        limits:
          memory: "64Mi"
          cpu: "100m"
      
      env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: myapp-config
              key: APP_ENV
        
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: myapp-secret
              key: DB_PASSWORD
      
      # nginx responds to / so we probe / instead of /health
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
      
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3
  
  automountServiceAccountToken: false
  restartPolicy: Always
